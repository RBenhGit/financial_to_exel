[tool:pytest]
# Performance Testing Configuration
# =================================

# Test directories
testpaths = tests/performance

# Markers for performance tests
markers =
    benchmark: Benchmark tests using pytest-benchmark
    stress_test: High-load stress tests
    memory_profile: Memory profiling tests
    api_dependent: Tests requiring real API access
    excel_dependent: Tests requiring Excel file processing
    regression: Performance regression detection tests
    slow: Tests that take longer than 30 seconds

# Pytest-benchmark configuration
addopts =
    --benchmark-columns=min,max,mean,stddev,median,ops,rounds
    --benchmark-sort=mean
    --benchmark-warmup=on
    --benchmark-warmup-iterations=3
    --benchmark-disable-gc
    --benchmark-skip-slow

# Custom benchmark options (can be overridden via command line)
# --benchmark-save=baseline          # Save benchmark results
# --benchmark-compare=baseline       # Compare against baseline
# --benchmark-compare-fail=min:10%   # Fail if 10% slower than baseline

# Memory profiling (requires memory-profiler)
# --memprof                          # Enable memory profiling

# Test output configuration
console_output_style = progress
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout for long-running tests
timeout = 300

# Parallel execution (install pytest-xdist for this)
# -n auto                            # Use all available CPU cores

# Coverage for performance tests (optional)
# --cov=core
# --cov=config
# --cov=utils
# --cov-report=html:htmlcov/performance
# --cov-report=term-missing

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::FutureWarning
    ignore:.*unclosed.*:ResourceWarning

# Minimum versions
minversion = 8.0