[tool:pytest]
# CI/CD optimized pytest configuration
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# CI-specific markers and options
markers =
    unit: marks tests as unit tests (fast, no external dependencies)
    integration: marks tests as integration tests (moderate speed, may use APIs)
    slow: marks tests as slow (> 30 seconds)
    api_dependent: marks tests that require API access
    excel_dependent: marks tests that require Excel files
    performance: marks tests as performance tests (long-running)
    timeout(seconds): applies timeout to individual tests
    ci_skip: marks tests to skip in CI environment

# Optimized addopts for CI/CD
addopts =
    --verbose
    --tb=short
    --strict-markers
    --disable-warnings
    -ra
    --timeout=60
    --timeout-method=thread
    --maxfail=3
    --no-cov-on-fail
    --durations=10
    --durations-min=1.0
    -x

# CI-specific test collection optimizations
collect_ignore = [
    "legacy/",
    "tools/",
    "scripts/",
    "data/",
    "reports/",
    "presentation/"
]

# Faster test discovery
cache_dir = .pytest_cache
python_paths = .

# Parallel execution settings (when using pytest-xdist)
# addopts = --numprocesses=auto --dist=worksteal

# Environment-specific configurations
env =
    CI = true
    PYTEST_CURRENT_TEST = true
    TEST_TIMEOUT = 60
    MAX_RETRIES = 2
    CACHE_DISABLED = true
