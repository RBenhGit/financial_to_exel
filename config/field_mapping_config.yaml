# Company-Specific Mappings
# --------------------------
# Override default mappings for specific companies (by ticker)
# Use when a company uses unique terminology or reporting structure
company_specific_mappings:
  AAPL:
    revenue: "Net Sales"
    cost_of_revenues: "Cost of Sales"
    rd_expenses: "Research and Development"

  MSFT:
    # Microsoft uses standard naming - inherits defaults
    revenue: "Revenue"

  GOOGL:
    revenue: "Revenues"
    cost_of_revenues: "Cost of Revenues"

  GOOG:
    revenue: "Revenues"
    cost_of_revenues: "Cost of Revenues"

  TSLA:
    revenue: "Total Revenues"
    cost_of_revenues: "Cost of Revenues"

  AMZN:
    revenue: "Net Sales"
    cost_of_revenues: "Cost of Sales"

  META:
    revenue: "Revenue"
    rd_expenses: "Research and Development Expenses"

