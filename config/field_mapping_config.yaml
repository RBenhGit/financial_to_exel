# Field Mapping Configuration
# ============================
#
# This configuration defines standardized field name mappings for financial statement data
# from various sources (Excel files, APIs) to internal standardized field names used in
# calculations and analysis.
#
# Structure:
# - default_mappings: Standard field name mappings used across all companies
# - company_specific_mappings: Company ticker-specific overrides
# - industry_mappings: Industry/sector-specific field name rules
# - reporting_standard_mappings: GAAP vs IFRS specific mappings
# - field_aliases: Alternative names that map to standard fields
# - required_fields: Critical fields that must be present for calculations
# - regex_patterns: Pattern-based field matching rules

# Default Mappings
# ----------------
