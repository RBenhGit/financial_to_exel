# Required Fields
# ---------------
# Critical fields that must be present for financial calculations
# Missing these fields will trigger warnings/errors
required_fields:
  # Income Statement
  - revenue
  - net_income
  - operating_income
  - gross_profit

  # Balance Sheet
  - total_assets
  - total_liabilities
  - shareholders_equity
  - cash_and_equivalents

  # Cash Flow
  - operating_cash_flow
  - capital_expenditures
  - free_cash_flow

# Regex Patterns
# --------------
# Pattern-based matching for complex field name structures
# Use for fields with variable formatting or prefixes/suffixes
regex_patterns:
  revenue: "^(Total\\s+)?(Net\\s+)?(Revenue|Sales|Turnover)s?$"
  net_income: "^Net\\s+(Income|Earnings|Profit)(\\s+to\\s+Company)?$"
  operating_income: "^Operating\\s+(Income|Profit|Earnings)$"
  ebit: "^E\\.?B\\.?I\\.?T\\.?$"
  ebitda: "^E\\.?B\\.?I\\.?T\\.?D\\.?A\\.?$"
  gross_profit: "^Gross\\s+(Profit|Income|Margin)$"
  operating_cash_flow: "^(Net\\s+)?Cash\\s+(from|provided\\s+by)\\s+Operat(ions|ing\\s+Activities)$"
  free_cash_flow: "^(Unlevered\\s+)?Free\\s+Cash\\s+Flow(\\s+to\\s+Firm)?$"
  capital_expenditures: "^Cap(ital)?\\s*Ex(penditures)?|PP&E\\s+Purchases$"

  # Balance Sheet patterns
  total_assets: "^Total\\s+Assets?$"
  total_liabilities: "^Total\\s+Liabilities$"
  shareholders_equity: "^(Shareholders?'?|Stockholders?'?)\\s+Equity$"

  # Expense patterns
  rd_expenses: "^R(&|and|&amp;)\\s*D(\\s+Expenses)?$"
  selling_marketing_expenses: "^Selling(\\s+and|\\s*&|\\s*,)\\s+Marketing(\\s+Expense)?$"

# Field Transformation Rules
# ---------------------------
# Rules for transforming field values during mapping
field_transformations:
  # Convert percentage strings to decimal
  percentage_fields:
    - revenue_growth
    - gross_profit_margin
    - operating_margin
    - net_margin

  # Fields that should be negative (expenses, decreases)
  negative_fields:
    - cost_of_revenues
    - operating_expenses
    - rd_expenses
    - selling_marketing_expenses
    - general_admin_expenses
    - income_tax_expense
    - interest_expense
    - capital_expenditures

  # Fields that represent absolute values
  absolute_value_fields:
    - total_assets
    - total_liabilities
    - shareholders_equity
    - revenue
    - net_income

# Validation Rules
# ----------------
# Rules for validating mapped field values
validation_rules:
  # Reasonable value ranges (for data quality checks)
  value_ranges:
    gross_profit_margin: [0.0, 1.0]  # 0-100%
    operating_margin: [-1.0, 1.0]    # -100% to 100%
    net_margin: [-1.0, 1.0]          # -100% to 100%
    current_ratio: [0.0, 20.0]       # 0 to 20x
    debt_to_equity: [0.0, 10.0]      # 0 to 10x

  # Fields that must be positive
  must_be_positive:
    - revenue
    - total_assets
    - shareholders_equity

  # Logical relationships that must hold
  logical_relationships:
    - name: "Assets = Liabilities + Equity"
      fields: [total_assets, total_liabilities, shareholders_equity]
      formula: "total_assets == total_liabilities + shareholders_equity"
      tolerance: 0.01  # Allow 1% difference for rounding

    - name: "Gross Profit = Revenue - Cost of Revenues"
      fields: [gross_profit, revenue, cost_of_revenues]
      formula: "gross_profit == revenue + cost_of_revenues"  # cost_of_revenues is negative
      tolerance: 0.01

    - name: "Free Cash Flow = Operating Cash Flow - Capital Expenditures"
      fields: [free_cash_flow, operating_cash_flow, capital_expenditures]
      formula: "free_cash_flow == operating_cash_flow + capital_expenditures"  # capex is negative
      tolerance: 0.01

# Mapping Quality Settings
# -------------------------
# Configuration for mapping quality assessment
mapping_quality:
  # Minimum confidence score for accepting a mapping
  min_confidence_score: 0.75

  # Thresholds for mapping quality grades
  quality_grades:
    excellent: 0.95  # Exact or alias match
    good: 0.85       # High-confidence fuzzy match
    acceptable: 0.75 # Acceptable fuzzy match
    poor: 0.60       # Low confidence, needs review

  # Flag mappings below this score for manual review
  manual_review_threshold: 0.75

  # Maximum number of alternative suggestions to provide
  max_alternatives: 5

# Fuzzy Matching Configuration
# -----------------------------
# Settings for fuzzy string matching algorithm
fuzzy_matching:
  # Default similarity threshold (0.0 to 1.0)
  default_threshold: 0.80

  # Threshold overrides by field type
  threshold_by_field:
    critical_fields: 0.90  # Higher threshold for required fields
    optional_fields: 0.75  # Lower threshold for optional fields

  # Normalization rules for fuzzy matching
  normalization:
    lowercase: true
    remove_punctuation: true
    remove_extra_whitespace: true
    remove_special_characters: false

  # Fuzzy matching algorithm parameters
  algorithm:
    type: "sequence_matcher"  # difflib.SequenceMatcher
    case_sensitive: false
    ignore_whitespace: true

# Logging Configuration
# ---------------------
# Settings for field mapping logging and debugging
logging:
  # Log all mapping attempts
  log_mappings: true

  # Log failed mappings
  log_failures: true

  # Log low-confidence mappings
  log_low_confidence: true
  low_confidence_threshold: 0.80

  # Include alternatives in logs
  include_alternatives: true

  # Detailed logging for specific fields
  detailed_logging_fields:
    - revenue
    - net_income
    - free_cash_flow

