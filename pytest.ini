[pytest]
minversion = 8.0
addopts =
    -ra
    --strict-markers
    --strict-config
    --cov-report=term-missing
    --cov-report=html
    --cov-report=json
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit: Unit tests for individual components
    integration: Integration tests for component interactions
    performance: Performance and optimization tests
    api_dependent: Tests requiring external API access
    excel_dependent: Tests requiring Excel files
    slow: Long-running tests (>5 seconds)
    regression: Regression tests for bug fixes
    unified_system: Tests for unified data system
    comprehensive: Comprehensive end-to-end tests
    dcf: DCF valuation tests
    pb: Price-to-Book analysis tests
    ddm: Dividend Discount Model tests
    financial_calc: Financial calculation engine tests
    data_processing: Data processing tests
    streamlit: Streamlit UI tests
    e2e: End-to-end workflow tests
    chaos: Chaos engineering and resilience tests
    asyncio: Asynchronous tests requiring asyncio
    benchmark: Benchmark tests using pytest-benchmark
    stress_test: High-load stress tests
    memory_profile: Memory profiling tests